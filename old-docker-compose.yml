version: '3.8'

services:
  one-system:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: one-system-app
    restart: unless-stopped
    ports:
      - "95:80"
    volumes:
      - ./storage/app:/var/www/html/storage/app
      - ./storage/logs:/var/www/html/storage/logs
    depends_on:
#      - postgres
      - redis
    networks:
      - cas-network
#    healthcheck:
#      test: ["CMD", "curl", "-f", "http://localhost/health"]
#      interval: 30s
#      timeout: 10s
#      retries: 3

#  postgres:
#    image: postgres:16-alpine
#    container_name: one-system-postgres
#    restart: unless-stopped
#    command:
#      - "postgres"
#      - "-c"
#      - "shared_preload_libraries=pg_stat_statements"
#      - "-c"
#      - "pg_stat_statements.track=all"
#    environment:
#      - POSTGRES_DB=cas_system
#      - POSTGRES_USER=cas_user
#      - POSTGRES_PASSWORD=cas_secure_password
#      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
#    volumes:
#      - postgres_data:/var/lib/postgresql/data
#      - ./docker/postgres/init:/docker-entrypoint-initdb.d
#    ports:
#      - "5432:5432"
#    networks:
#      - cas-network
#    healthcheck:
#      test: ["CMD-SHELL", "pg_isready -U cas_user -d cas_system"]
#      interval: 10s
#      timeout: 5s
#      retries: 5

  redis:
    image: redis:7-alpine
    container_name: one-system-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass cas_redis_password
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - cas-network
#    healthcheck:
#      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
#      interval: 10s
#      timeout: 3s
#      retries: 5

  nginx-lb:
    image: nginx:alpine
    container_name: one-system-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx-lb.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - one-system
    networks:
      - cas-network
    profiles:
      - with-lb

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: one-system-queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./storage/logs:/var/www/html/storage/logs
    depends_on:
#      - postgres
      - redis
    networks:
      - cas-network

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: one-system-scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    volumes:
      - ./storage/logs:/var/www/html/storage/logs
    depends_on:
#      - postgres
      - redis
    networks:
      - cas-network
    profiles:
      - with-scheduler

volumes:
#  postgres_data:
#    driver: local
  redis_data:
    driver: local

networks:
  cas-network:
    driver: bridge